server:
  port: 8123
  servlet:
    context-path: /api
  address: 0.0.0.0

spring:
  #激活使用本地环境
  profiles:
    active: local
  application:
    name: soundplulse-backend
  #限制文件大小
  servlet:
    multipart:
      max-file-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    #打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #设置逻辑删除字段
  global-config:
    db-config:
      logic-delete-field: isDelete
      #当值为1时，表示逻辑删除
      logic-delete-value: 1
      #逻辑未删除值
      logic-not-delete-value: 0
    enable-sql-runner: true
#接口文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.timess.soundplulse.controller
logging:
  level:
    com:
      timess:
        soundplulse:
          controller: debug
